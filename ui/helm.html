<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Helm</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body>
  <header class="shell-header">
    <span class="wordmark">Helm</span>
    <nav class="shell-nav" aria-label="Primary">
      <a href="#/choose" data-view="choose">Choose</a>
      <a href="#/canvas" data-view="canvas">Canvas</a>
      <a href="#/connect" data-view="connect">Connect</a>
      <a href="#/run" data-view="run">Run</a>
      <a href="#/verify" data-view="verify">Verify</a>
      <a href="#/review" data-view="review">Review</a>
      <a href="#/operate" data-view="operate">Operate</a>
    </nav>
    <span class="status-pill">
      <span id="status-dot" class="status-dot" data-state="dormant"></span>
      <span id="status-label">not paired</span>
      <button id="unpair-btn" class="secondary" type="button">Unpair</button>
    </span>
  </header>
  <main id="shell-main" class="shell-main" aria-live="polite"></main>
  <script type="module" src="app.mjs"></script>
</body>
</html>

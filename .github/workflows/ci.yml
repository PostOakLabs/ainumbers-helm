name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
      - name: hook↔CI parity (no gate drift)
        run: node scripts/check-hook-ci-parity.mjs
      - name: lint
        run: node scripts/lint.mjs
      - name: test
        run: node scripts/test.mjs
      - name: validate control-plane schemas
        run: node scripts/validate-schemas.mjs
      - name: verify vendored OCG integrity
        run: node scripts/verify-vendored.mjs
      - name: compile parity gate (HELM-P2-C2)
        run: node scripts/compile-parity-gate.mjs
      - name: sea build dry-run
        run: node scripts/sea-dry-run.mjs

  # Live third-party coverage (FreeTSA / OTS). NON-BLOCKING by design:
  # continue-on-error so a third-party outage never reddens main or blocks a
  # PR. The blocking `ci` job stays fully offline (see test-support/live.mjs).
  live-net:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
      - name: test (live network)
        env:
          HELM_LIVE_NET: "1"
        run: node scripts/test.mjs

name: Release

# HELM-H8: tag-triggered three-platform SEA build + signed release manifest
# + packaging manifests, published as a GitHub pre-release. Never runs on
# push to main — only on an explicit `v*` tag, so cutting a release is a
# deliberate act (git tag + push), not a side effect of merging.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
      - name: lint
        run: node scripts/lint.mjs
      - name: test
        run: node scripts/test.mjs
      - name: validate control-plane schemas
        run: node scripts/validate-schemas.mjs
      - name: sea build dry-run
        run: node scripts/sea-dry-run.mjs

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            tag: linux-x64
          - os: windows-latest
            tag: windows-x64
          # macos-13 (Intel) was retired by GitHub 2025-12-04; macos-15-intel
          # is the current Intel image (supported through Aug 2027).
          - os: macos-15-intel
            tag: macos-x64
          - os: macos-14
            tag: macos-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
      - name: build SEA binary (${{ matrix.tag }})
        run: node scripts/build-sea.mjs
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: helmd-${{ matrix.tag }}
          path: dist/${{ matrix.tag }}/*
          if-no-files-found: error

  sign-and-release:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    outputs:
      is_ga: ${{ steps.tag-kind.outputs.is_ga }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          path: dist
          pattern: helmd-*
          merge-multiple: false

      # download-artifact lands each matrix artifact under dist/helmd-<tag>/;
      # release-manifest.mjs expects dist/<tag>/. Flatten the prefix.
      - name: flatten artifact layout
        run: |
          for d in dist/helmd-*; do
            tag="${d#dist/helmd-}"
            mkdir -p "dist/$tag"
            mv "$d"/* "dist/$tag"/
            rmdir "$d"
          done
          ls -R dist

      - name: derive release version from tag
        run: echo "HELM_RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # -rc tags stay GitHub prereleases and never publish to npm; only a
      # bare vN.N.N GA tag does both. publish-npm reads this job output to
      # decide whether to run at all.
      - name: classify tag (GA vs -rc)
        id: tag-kind
        run: |
          if [[ "$GITHUB_REF_NAME" == *-rc* ]]; then
            echo "is_ga=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_ga=true" >> "$GITHUB_OUTPUT"
          fi

      - name: sign release manifest
        env:
          HELM_RELEASE_SIGNING_KEY_B64: ${{ secrets.HELM_RELEASE_SIGNING_KEY_B64 }}
        run: node scripts/release-manifest.mjs

      - name: verify release manifest (fail closed before publishing)
        run: node scripts/verify-release-manifest.mjs dist

      - name: generate packaging manifests
        run: node scripts/gen-packaging-manifests.mjs

      # Release assets share one flat namespace — three binaries all named
      # `helmd` collide (second upload 404s). Stage platform-suffixed copies.
      # The signed manifest's subject names stay `<platform>/<file>`; INSTALL.md
      # documents the rename mapping for manual verification.
      - name: stage release assets
        run: |
          mkdir -p dist/upload
          cp dist/linux-x64/helmd      dist/upload/helmd-linux-x64
          cp dist/macos-x64/helmd     dist/upload/helmd-macos-x64
          cp dist/macos-arm64/helmd   dist/upload/helmd-macos-arm64
          cp dist/windows-x64/helmd.exe dist/upload/helmd-windows-x64.exe
          cp dist/release-manifest.json dist/release-manifest.dsse.json dist/upload/

      # HELM-P3-D8: offline install path for environments that block the npm
      # registry (bank proxies, airgapped hosts) — `npm install
      # ./helm-cli-<version>.tgz` needs no registry reachability at all. Packed
      # from the SAME filled package gen-packaging-manifests.mjs just wrote
      # (real sha256 values baked in, no template placeholders), so it is
      # byte-identical to what publish-npm would publish. `npm pack` reads
      # package.json + files only — no install, no network, safe under SO #10.
      - name: pack offline npm tarball
        run: |
          TARBALL=$(cd dist/packaging/npm && npm pack --silent --pack-destination "$GITHUB_WORKSPACE/dist/upload")
          mv "dist/upload/$TARBALL" "dist/upload/helm-cli-${HELM_RELEASE_VERSION}.tgz"

      # D-SIGN-1 free hardening: a plain SHA256SUMS file gives anyone
      # `sha256sum -c` verification with zero tooling beyond coreutils,
      # alongside (not instead of) the DSSE-signed release-manifest above.
      # Runs after every asset (incl. the offline tarball) is staged so the
      # sums file covers the exact set of files in the GitHub release.
      - name: generate SHA256SUMS
        working-directory: dist/upload
        run: sha256sum * > SHA256SUMS

      # D-SIGN-1: GitHub-native SLSA build provenance for every release
      # asset. First-party action, no SO #17 authorization needed (unlike
      # sigstore/cosign-installer, which stays out per HELM-CODE-SIGNING-
      # RESEARCH-2026-07-23 §5). Verify with:
      #   gh attestation verify dist/upload/helmd-linux-x64 --repo PostOakLabs/ainumbers-helm
      - name: attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "dist/upload/helmd-*\ndist/upload/helm-cli-*.tgz"

      - name: create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # RC tags (v1.2.3-rc1) stay --prerelease; GA tags (vN.N.N) self-promote to --latest.
          if [[ "${{ steps.tag-kind.outputs.is_ga }}" == "true" ]]; then
            PROMOTE_FLAG=--latest
          else
            PROMOTE_FLAG=--prerelease
          fi
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Helm $GITHUB_REF_NAME" \
            --generate-notes \
            "$PROMOTE_FLAG" \
            dist/upload/*

      # HELM-REL-AUTO-4: the filled npm package (package.json/bin/install.mjs
      # with real sha256 values, no template placeholders) lands here from
      # gen-packaging-manifests.mjs above. publish-npm downloads it rather
      # than regenerating, so what's published is byte-identical to what the
      # release manifest attested to.
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-package
          path: dist/packaging/npm
          if-no-files-found: error

  # HELM-REL-NPM-DEFER: ainumbers-helm is unregistered on npm and npm only
  # lets you attach a trusted publisher from an EXISTING package's settings
  # page, so there is no way to configure OIDC trusted publishing before a
  # first manual bootstrap publish. Tim decision 2026-07-23: defer npm
  # distribution — the signed GitHub release stands alone for GA. Gate this
  # job behind an explicit opt-in var (default unset/false) so it SKIPS
  # cleanly instead of red-failing the first GA tag. Revive trigger: once
  # the npm trusted publisher is attached (requires the package to exist
  # first), flip vars.NPM_PUBLISH_ENABLED to 'true' in repo settings — no
  # other change needed, the OIDC wiring below stays intact.
  publish-npm:
    needs: sign-and-release
    if: needs.sign-and-release.outputs.is_ga == 'true' && vars.NPM_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: npm-package
          path: npm-package
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # OIDC trusted publishing needs npm CLI >=11.5.1; setup-node's bundled
      # CLI lags behind, so pin to latest before publishing.
      - name: update npm CLI for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: publish to npm (OIDC provenance, no token)
        working-directory: npm-package
        run: npm publish --access public --provenance
